<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>ImmuneNexus</title>
    <style>
        body { font-family: sans-serif; background: #fafafa; color: #111; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .w { max-width: 900px; width: 100%; display: flex; flex-direction: column; gap: 30px; }
        .panel { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 32px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .group { margin-bottom: 20px; }
        .group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; }
        .group input { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #e5e5e5; border-radius: 6px; font-family: monospace; }
        .btn { width: 100%; background: #111; color: #fff; border: none; padding: 14px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .item { margin-bottom: 18px; }
        .item label { display: block; font-size: 0.8rem; font-weight: 600; color: #666; margin-bottom: 4px; }
        .val { background: #f9f9f9; border: 1px solid #f0f0f0; padding: 12px; border-radius: 6px; font-family: monospace; min-height: 20px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="w">
        <div style="text-align:center;"><h1>ImmuneNexus Central Data Hub</h1><p>글로벌 오픈 베타 - 암 항원 구조 예측 포털</p></div>
        <div class="grid">
            <div class="panel">
                <h2>AI 분석 파라미터 기입</h2>
                <div class="group"><label>Peptide Sequence</label><input type="text" id="pIn" value="CTELKLSDY"></div>
                <div class="group"><label>HLA Allele Type</label><input type="text" id="hIn" value="HLA-A*03:01"></div>
                <button class="btn" onclick="run()">오픈 베타 즉시 가동하기</button>
            </div>
            <div class="panel">
                <h2>AI 구조 연산 결과 (7ms)</h2>
                <div class="item"><label>MHC Sequence</label><div class="val" id="oMhc">대기 중...</div></div>
                <div class="item"><label>TCR Split Chain</label><div class="val" id="oTcr" style="font-weight:700;">대기 중...</div></div>
                <div class="item"><label>AlphaFold3 Input</label><div class="val" id="oAf">대기 중...</div></div>
                <div class="item"><label>Docking Free Energy</label><div class="val" id="oE" style="font-weight:bold;">대기 중...</div></div>
                <div class="item"><label>Safety Verdict</label><div class="val" id="oV">대기 중...</div></div>
            </div>
        </div>
    </div>
    <script>
        async function run() {
            const p = document.getElementById('pIn').value.trim();
            const h = document.getElementById('hIn').value.trim();
            if(!p || !h) { alert('입력값을 확인해주세요.'); return; }
            document.getElementById('oMhc').innerText='연산 중...'; document.getElementById('oTcr').innerText='연산 중...';
            document.getElementById('oAf').innerText='연산 중...'; document.getElementById('oE').innerText='연산 중...'; document.getElementById('oV').innerText='연산 중...';
            try {
                const res = await fetch('https://onrender.com', {
                    method: 'POST', 
                    mode: 'cors', // 브라우저 차단 우회를 위한 교차 출처 명시
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ license_tier:"Standard Pro",billing_cycle:"monthly",account_active_seats_count:3,current_month_cumulative_usage:500,text_peptide:p,text_hla:h })
                });
                if(!res.ok) throw new Error();
                const responseData = await res.json();
                const data = responseData.data;
                document.getElementById('oMhc').innerText = data.extracted_hla_amino_acid_sequence.substring(0,40) + '...';
                document.getElementById('oTcr').innerText = data.full_tcr_input_for_docking;
                document.getElementById('oAf').innerText = data.alphafold_multimer_ready_input.substring(0,40) + '...';
                document.getElementById('oE').innerText = data.predicted_docking_energy_kcal_mol + ' kcal/mol';
                document.getElementById('oV').innerText = data.verdict;
                document.getElementById('oV').style.color = (data.verdict==='APPROVED_FOR_CLINICAL') ? '#00875a' : '#ff0000';
                document.getElementById('oV').style.fontWeight = '700';
            } catch(e) {
                alert('Render 서버가 수면 모드 상태일 수 있습니다. 확인을 누르고 [오픈 베타 즉시 가동하기] 버튼을 1번만 더 클릭해 주세요.');
            }
        }
    </script>
</body>
</html>
